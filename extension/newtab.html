<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily Tabs OS</title>
<link rel="stylesheet" href="newtab.css">
</head>
<body>

<div class="app">

<header class="topbar">
<h1>Daily Tabs OS</h1>
<div id="todayDate"></div>
</header>

<div class="layout">

<aside class="sidebar">
<h2>Tasks</h2>

<div class="section">
<h3>Morning ☀️</h3>
<ul id="morningList"></ul>
</div>

<div class="section">
<h3>Day 💼</h3>
<ul id="dayList"></ul>
</div>

<div class="section">
<h3>Evening 🌙</h3>
<ul id="eveningList"></ul>
</div>
</aside>

<main class="workspace">

<h2>Workspace</h2>

<div class="grid">

<a href="https://calendar.mail.ru/" target="_blank">Mail Calendar</a>

<a href="https://mail.ru/" target="_blank">Mail.ru</a>

<a href="https://github.com/" target="_blank">GitHub</a>

<a href="https://web.telegram.org/" target="_blank">Telegram</a>

<a href="https://tradingview.com/" target="_blank">TradingView</a>

<a href="https://binance.com/" target="_blank">Binance</a>

</div>

</main>

<aside class="rightbar">
<h2>Notes</h2>
<textarea placeholder="Quick notes..."></textarea>
</aside>

</div>

</div>

<script src="newtab.js"></script>
</body>
</html>
