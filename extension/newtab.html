<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testnet Planner</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>

<div class="app">
  <!-- Верхняя панель -->
  <header class="topbar">
    <div>
      <h1 id="appTitle">🧪 Testnet Planner</h1>
      <p id="todayDate"></p>
    </div>
    <div class="stats">
      <div class="badge" id="taskCounter">0/0</div>
      <button id="langToggle" class="small-btn">RU/EN</button>
    </div>
  </header>

  <!-- Кнопки управления -->
  <div class="action-bar">
    <button id="addTaskBtn" class="primary-btn">➕ <span id="addBtnText">Add Task</span></button>
    <button id="massImportBtn" class="secondary-btn">📥 <span id="importBtnText">Mass Import</span></button>
    <button id="exportBtn" class="secondary-btn">📤 <span id="exportBtnText">Export</span></button>
  </div>

  <!-- Сетка задач (два ряда) -->
  <div class="tasks-grid" id="tasksGrid"></div>
</div>

<script src="shared.js"></script>
<script src="newtab.js"></script>
</body>
</html>
