<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Testnet Runner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="app">
  <header class="topbar">
    <div>
      <h1>✅ Testnet Runner</h1>
      <p id="todayDate"></p>
    </div>
    <div class="badge" id="progressBadge">0/0</div>
  </header>

  <!-- Прогресс-бар -->
  <div class="progress-container">
    <div class="progress-bar" id="progressFill"></div>
    <div class="progress-text" id="progressPercent">0%</div>
  </div>

  <!-- Список задач -->
  <div class="task-container" id="taskList"></div>

  <!-- Кнопки управления -->
  <div class="actions-bar">
    <button id="exportBtn" class="full-btn">📤 Export Today</button>
    <button id="addTemplateBtn" class="full-btn">➕ Add Task to Template</button>
    <button id="massImportBtn" class="full-btn">📥 Mass Import (100+)</button>
  </div>

  <button id="langToggle" class="full-btn">RU / EN</button>
</div>

<script src="shared.js"></script>
<script src="popup.js"></script>
</body>
</html>
